services:
  dify-proxy:
    profiles:
      - dify
    build:
      context: ./dify-proxy
    container_name: ai4sec-dify-proxy
    env_file: .env
    ports:
      - "${DIFY_PROXY_PORT}:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
      - dify_default

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE}
    container_name: scholar-backend
    network_mode: host
    env_file: .env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DIFY_API_BASE=http://127.0.0.1:${DIFY_PROXY_PORT}
      - BACKEND_HEALTHCHECK_URL=http://127.0.0.1:${BACKEND_PORT}/api/models
      - HTTP_PROXY=${AI4SEC_BACKEND_PROXY}
      - HTTPS_PROXY=${AI4SEC_BACKEND_PROXY}
      - ALL_PROXY=${AI4SEC_BACKEND_PROXY}
      - http_proxy=${AI4SEC_BACKEND_PROXY}
      - https_proxy=${AI4SEC_BACKEND_PROXY}
      - all_proxy=${AI4SEC_BACKEND_PROXY}
      - NO_PROXY=${AI4SEC_NO_PROXY}
      - no_proxy=${AI4SEC_NO_PROXY}
    volumes:
      - ./docker-data:/scholar/backend/data
    restart: unless-stopped
    mem_limit: ${BACKEND_MEM_LIMIT:-2g}
    command: ["/scholar/backend/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${BACKEND_PORT}"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(os.environ['BACKEND_HEALTHCHECK_URL'])",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE}
        BACKEND_URL: ${BACKEND_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    container_name: scholar-frontend
    env_file: .env
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dify_default:
    external: true
    name: ${DIFY_DOCKER_NETWORK}
