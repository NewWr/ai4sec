services:
  ai4sec-dify-sync:
    build:
      context: .
    container_name: ai4sec-dify-sync
    env_file:
      - ../.env
    environment:
      AI4SEC_DATA_DIR: /ai4sec-data
      AI4SEC_APP_DB: /ai4sec-data/app.db
      DIFY_SYNC_STATE_DB: /app/state/dify_syncs.db
    volumes:
      - ../docker-data:/ai4sec-data:ro
      - ./state:/app/state
    restart: unless-stopped
    networks:
      - dify_default

networks:
  dify_default:
    external: true
    name: ${DIFY_DOCKER_NETWORK:-docker_default}
